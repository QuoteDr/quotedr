<!DOCTYPE html>
<html>
<head>
<title>Portal Debug</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-4">
<h4>Portal Debug Page</h4>
<div id="log" style="font-family:monospace; font-size:13px; background:#f8f9fa; padding:1rem; border-radius:8px;"></div>

<div class="mt-3">
<label class="fw-bold">Test PIN Input (type a digit):</label>
<div class="d-flex gap-2 mt-1">
  <input type="text" class="form-control text-center fw-bold fs-3" style="width:60px;height:60px;" maxlength="1" id="t0" inputmode="numeric" autocomplete="off" oninput="testPinInput(this,0)" onfocus="this.select()">
  <input type="text" class="form-control text-center fw-bold fs-3" style="width:60px;height:60px;" maxlength="1" id="t1" inputmode="numeric" autocomplete="off" oninput="testPinInput(this,1)" onfocus="this.select()">
  <input type="text" class="form-control text-center fw-bold fs-3" style="width:60px;height:60px;" maxlength="1" id="t2" inputmode="numeric" autocomplete="off" oninput="testPinInput(this,2)" onfocus="this.select()">
  <input type="text" class="form-control text-center fw-bold fs-3" style="width:60px;height:60px;" maxlength="1" id="t3" inputmode="numeric" autocomplete="off" oninput="testPinInput(this,3)" onfocus="this.select()">
</div>
</div>

<button class="btn btn-primary mt-3" onclick="testUnlock()">Test Unlock (PIN 9021, client "Adam 2")</button>

<script>
function log(msg) {
    document.getElementById('log').innerHTML += msg + '<br>';
}

// Test 1: Is supabase global defined?
log('1. typeof supabase: ' + typeof supabase);
log('2. supabase object keys: ' + (typeof supabase === 'object' ? Object.keys(supabase).join(', ') : 'N/A'));

// Test 2: Can we create a client?
var client = null;
try {
    client = supabase.createClient(
        'https://axmoffknvblluibuitrq.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4bW9mZmtudmJsbHVpYnVpdHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI0ODAsImV4cCI6MjA5MTQ0ODQ4MH0.SULFrXCwoABe9w4J_MBNQq6HQfzx2Sns-11uxGZYAso'
    );
    log('3. createClient: SUCCESS');
} catch(e) {
    log('3. createClient ERROR: ' + e.message);
}

// Test 3: PIN input auto-advance
function testPinInput(el, idx) {
    if (el.value.length > 1) el.value = el.value.slice(-1);
    el.value = el.value.replace(/[^0-9]/g, '');
    log('PIN input ' + idx + ': value="' + el.value + '"');
    if (el.value.length === 1 && idx < 3) {
        document.getElementById('t' + (idx + 1)).focus();
        log('  -> focused t' + (idx + 1));
    } else if (el.value.length === 1 && idx === 3) {
        log('  -> all 4 digits entered!');
    }
}

// Test 4: Fetch to verify-portal-pin
async function testUnlock() {
    log('--- Testing unlock ---');
    var key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4bW9mZmtudmJsbHVpYnVpdHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI0ODAsImV4cCI6MjA5MTQ0ODQ4MH0.SULFrXCwoABe9w4J_MBNQq6HQfzx2Sns-11uxGZYAso';
    try {
        log('4. Fetching verify-portal-pin...');
        var res = await fetch('https://axmoffknvblluibuitrq.supabase.co/functions/v1/verify-portal-pin', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': key,
                'Authorization': 'Bearer ' + key
            },
            body: JSON.stringify({
                clientName: 'Adam 2',
                contractorId: '25bbd251-205a-425d-9f9c-5509cc3c6d1c',
                pin: '9021'
            })
        });
        log('5. Response status: ' + res.status);
        var data = await res.json();
        log('6. Response body: ' + JSON.stringify(data));
    } catch(e) {
        log('FETCH ERROR: ' + e.message);
    }
}
</script>
</body>
</html>
