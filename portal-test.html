<!DOCTYPE html>
<html>
<head>
<title>Portal Modal Test</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<h3>Portal Modal Test</h3>
<button class="btn btn-primary" onclick="testModal()">Test Modal</button>
<div id="log" class="mt-3" style="font-family:monospace; font-size:12px;"></div>

<div class="modal fade" id="testPortalModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:#1a2940; color:white;">
        <h5 class="modal-title">Test Portal Modal</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <p>If you see this, modals work!</p>
        <p id="testStatus">Waiting...</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function log(msg) {
    document.getElementById('log').innerHTML += msg + '<br>';
}

function testModal() {
    log('1. Button clicked');
    var el = document.getElementById('testPortalModal');
    log('2. Modal element: ' + (el ? 'FOUND' : 'NOT FOUND'));
    try {
        var modal = new bootstrap.Modal(el);
        log('3. Modal instance created');
        modal.show();
        log('4. modal.show() called');
        document.getElementById('testStatus').textContent = 'Modal is working!';
    } catch(e) {
        log('ERROR: ' + e.message);
    }
}
</script>
</body>
</html>
