		<div class="settings-card" style="border: 2px solid #e87e2a; margin-top: 2rem;">
			<h5><i class="fas fa-flask me-2" style="color:#e87e2a"></i>Developer Testing</h5>
			<p class="text-muted small mb-3">Tools for testing the app. Not for normal use.</p>
			<button class="btn btn-warning btn-sm me-2" onclick="resetOnboarding()">
				<i class="fas fa-redo me-1"></i> Reset Onboarding
			</button>
			<button class="btn btn-outline-danger btn-sm" onclick="if(confirm('Clear ALL local data? This cannot be undone.')) { localStorage.clear(); alert('Cleared! Reloading...'); window.location.reload(); }">
				<i class="fas fa-trash me-1"></i> Clear All Local Data
			</button>
		</div>
	</body>
