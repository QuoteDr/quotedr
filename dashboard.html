<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteDr.io - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .quote-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .quote-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .status-draft { color: #6c757d; }
        .status-sent { color: #0d6efd; }
        .status-viewed { color: #0dcaf0; font-weight: 600; }
        .status-accepted { color: #198754; }
        .status-invoiced { color: #ffc107; }
        .status-declined { color: #dc3545; }
        .quote-card .status-select {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .quote-card .btn-outline-danger {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
        }
        @media (max-width: 768px) {
            .quote-card {
                padding: 0.75rem;
            }
            .quote-card .d-flex {
                flex-direction: column;
                gap: 0.5rem;
            }
            .quote-card .d-flex.justify-content-between {
                flex-direction: column;
                align-items: flex-start;
            }
            .quote-card .text-end {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4 py-2" style="background: #f0f4fa; border-bottom: 2px solid #d0dff0; position: relative; min-height: 64px;">
        <div class="d-flex align-items-center gap-3">
            <a href="quote-builder.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <a href="help.html" class="text-muted small ms-2" title="Help"><i class="fas fa-question-circle"></i> Help</a>
        </div>
        <div style="position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 1.1rem; color: #0f3460;">QuoteDr.io</div>
        <div class="d-flex align-items-center gap-2">
            <span class="fw-bold small" id="userName"></span>
            <a href="settings.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-cog"></i> Settings
            </a>
        </div>
    </nav>
    <div class="container py-4">

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-primary">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total Quotes</h5>
                        <p class="display-6" id="totalQuotesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-success">
                    <div class="card-body text-center">
                        <h5 class="card-title">Accepted</h5>
                        <p class="display-6" id="acceptedQuotesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-warning">
                    <div class="card-body text-center">
                        <h5 class="card-title">Invoiced</h5>
                        <p class="display-6" id="invoicedQuotesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-info">
                    <div class="card-body text-center">
                        <h5 class="card-title">Revenue</h5>
                        <p class="display-6" id="totalRevenue">$0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quotes List -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h3 class="mb-0">Recent Quotes</h3>
                        <button class="btn btn-outline-secondary btn-sm" onclick="loadQuotes()" title="Refresh quotes"><i class="fas fa-sync-alt"></i></button>
                        <div class="d-flex gap-2 flex-wrap">
                            <button class="btn btn-sm btn-outline-secondary" onclick="refreshQuotes()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="exportQuotesToCSV()">
                                <i class="fas fa-file-export"></i> Export CSV
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Search and Filter Bar -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-2 mb-md-0">
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="fas fa-search text-muted"></i>
                                    </span>
                                    <input type="text" id="searchInput" class="form-control" placeholder="Search by client name or quote number..." oninput="filterQuotes()">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select id="statusFilter" class="form-select" onchange="filterQuotes()">
                                    <option value="all">All Statuses</option>
                                    <option value="draft">Draft</option>
                                    <option value="sent">Sent</option>
                                    <option value="accepted">Accepted</option>
                                    <option value="invoiced">Invoiced</option>
                                    <option value="declined">Declined</option>
                                </select>
                            </div>
                            <div class="col-md-3 text-md-end">
                                <span id="filteredCount" class="text-muted small"></span>
                            </div>
                        </div>

                        <div id="quotesList">
                            <!-- Quotes will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-5 text-center text-muted small">
            <p>QuoteDr.io - Professional Quoting & Invoicing Software</p>
            <p class="mt-2">
                <a href="terms.html" class="text-decoration-none text-muted">Terms</a> | 
                <a href="privacy.html" class="text-decoration-none text-muted">Privacy Policy</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-v2.js"></script>
    <script>
        // ─── DASHBOARD FUNCTIONS ─────────────────────────────────────────────────────

        let allQuotes = []; // Store all quotes for client-side filtering

        async function refreshQuotes() {
            try {
                const { data, error } = await listQuotesFromSupabase();
                if (error === 'Not authenticated') {
                    // Retry after delay — session may not be ready yet
                    setTimeout(async function() {
                        const retry = await listQuotesFromSupabase();
                        if (!retry.error) {
                            allQuotes = retry.data || [];
                            renderQuotes(allQuotes);
                            updateStats(allQuotes);
                        } else {
                            document.getElementById('quotesList').innerHTML = '<div class="alert alert-warning">Please <a href="login.html">log in</a> to see your quotes.</div>';
                        }
                    }, 1500);
                    return;
                }
                if (error) throw error;
                allQuotes = data || [];
                renderQuotes(allQuotes);
                updateStats(allQuotes);
            } catch (err) {
                console.error('Error loading quotes:', err.message || err);
                document.getElementById('quotesList').innerHTML = '<div class="alert alert-danger">Error loading quotes: ' + (err.message || err) + '</div>';
            }
        }

        function updateStats(quotes) {
            const total = quotes.length;
            const accepted = quotes.filter(q => q.status === 'accepted').length;
            const invoiced = quotes.filter(q => q.status === 'invoiced').length;
            const revenue = quotes.reduce((sum, q) => sum + (parseFloat(q.total) || 0), 0);

            document.getElementById('totalQuotesCount').textContent = total;
            document.getElementById('acceptedQuotesCount').textContent = accepted;
            document.getElementById('invoicedQuotesCount').textContent = invoiced;
            document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(2);
        }

        function renderQuotes(quotes) {
            const el = document.getElementById('quotesList');
            if (!quotes.length) {
                el.innerHTML = `<div class="text-center py-5">
                    <i class="fas fa-file-invoice fa-4x mb-4" style="color:#1a56a0; opacity:0.3;"></i>
                    <h4 style="color:#444;">No quotes yet</h4>
                    <p class="text-muted mb-4">Start building your first professional quote — it only takes a minute.</p>
                    <a href="quote-builder.html" class="btn btn-lg" style="background:#e87e2a; color:#fff; font-weight:600;">
                        <i class="fas fa-plus me-2"></i>Build Your First Quote
                    </a>
                </div>`;
                return;
            }
            el.innerHTML = quotes.map(q => `
                <div class="quote-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div onclick="openQuote('${q.id}')" style="flex:1; cursor:pointer;">
                            <div class="fw-bold">${q.client_name || 'Unnamed Client'}</div>
                            <div class="text-muted small">${q.quote_number ? '#' + q.quote_number + ' · ' : ''}${formatDate(q.quote_date)} · Updated ${timeAgo(q.updated_at)}</div>
                        </div>
                        <div class="text-end d-flex flex-column align-items-end gap-1">
                            <div class="fw-bold">$${parseFloat(q.total || 0).toFixed(2)}</div>
                            <select class="status-select status-${q.status}" onchange="updateQuoteStatus('${q.id}', this.value)">
                                <option value="draft" ${q.status === 'draft' ? 'selected' : ''}>Draft</option>
                                <option value="sent" ${q.status === 'sent' ? 'selected' : ''}>Sent</option>
                                <option value="viewed" ${q.status === 'viewed' ? 'selected' : ''}>👁 Viewed</option>
                                <option value="accepted" ${q.status === 'accepted' ? 'selected' : ''}>✅ Accepted</option>
                                <option value="invoiced" ${q.status === 'invoiced' ? 'selected' : ''}>Invoiced</option>
                                <option value="declined" ${q.status === 'declined' ? 'selected' : ''}>Declined</option>
                            </select>
                            <button class="btn btn-outline-danger" onclick="deleteQuote('${q.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterQuotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allQuotes.filter(quote => {
                const matchesSearch = !searchTerm ||
                    (quote.client_name && quote.client_name.toLowerCase().includes(searchTerm)) ||
                    (quote.quote_number && quote.quote_number.toLowerCase().includes(searchTerm));
                const matchesStatus = statusFilter === 'all' || quote.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            renderQuotes(filtered);
            document.getElementById('filteredCount').textContent = filtered.length > 0 ? `${filtered.length} quote${filtered.length !== 1 ? 's' : ''} found` : '';
        }

        function openQuote(quoteId) {
            // Pass the quote ID to quote-builder via URL param so it loads the right quote
            window.location.href = 'quote-builder.html?load=' + quoteId;
        }

        async function updateQuoteStatus(quoteId, newStatus) {
            const quote = allQuotes.find(q => q.id === quoteId);
            if (quote) {
                quote.status = newStatus;
                renderQuotes(allQuotes);
                updateStats(allQuotes);
            }
            try {
                const { error } = await _supabase
                    .from('quotes')
                    .update({ status: newStatus, updated_at: new Date().toISOString() })
                    .eq('id', quoteId);
                if (error) console.error('Status update error:', error);
            } catch(e) { console.warn('Could not update status in Supabase:', e); }
        }

        async function deleteQuote(quoteId) {
            if (!confirm('Are you sure you want to delete this quote?')) return;

            const result = await deleteQuoteFromSupabase(quoteId);
            if (result && result.error) {
                console.error('Error deleting quote:', result.error);
                alert('Failed to delete quote: ' + (result.error.message || result.error));
                return;
            }
            allQuotes = allQuotes.filter(q => q.id !== quoteId);
            renderQuotes(allQuotes);
            updateStats(allQuotes);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        // Load user name
        document.addEventListener('DOMContentLoaded', async () => {
            const userName = localStorage.getItem('ald_user_name') || 'User';
            document.getElementById('userName').textContent = userName;

            // Load quotes — retry up to 3 times to handle auth session warmup
            var attempts = 0;
            async function loadWithRetry() {
                attempts++;
                var result = await listQuotesFromSupabase();
                if (result.error === 'Not authenticated' && attempts < 3) {
                    setTimeout(loadWithRetry, 800 * attempts);
                } else if (!result.error) {
                    allQuotes = result.data || [];
                    renderQuotes(allQuotes);
                    updateStats(allQuotes);
                } else {
                    document.getElementById('quotesList').innerHTML = '<div class="alert alert-warning">Please <a href="login.html">log in</a> to see your quotes.</div>';
                }
            }
            loadWithRetry();
        });
    </script>
    <script src="ai-assistant.js"></script>
</body>
</html>
