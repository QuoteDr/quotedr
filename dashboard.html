<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteDr.io - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .quote-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .quote-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .status-draft { color: #6c757d; }
        .status-sent { color: #0d6efd; }
        .status-viewed { color: #0dcaf0; font-weight: 600; }
        .status-in_review { color: #fd7e14; font-weight: 600; }
        .status-accepted { color: #198754; }
        .status-invoiced { color: #ffc107; }
        .status-declined { color: #dc3545; }
        .quote-card .status-select {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .quote-card .btn-outline-danger {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
        }
        @media (max-width: 768px) {
            .quote-card {
                padding: 0.75rem;
            }
            .quote-card .d-flex {
                flex-direction: column;
                gap: 0.5rem;
            }
            .quote-card .d-flex.justify-content-between {
                flex-direction: column;
                align-items: flex-start;
            }
            .quote-card .text-end {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4 py-2" style="background: #f0f4fa; border-bottom: 2px solid #d0dff0; position: relative; min-height: 64px;">
        <div class="d-flex align-items-center gap-3">
            <a href="quote-builder.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <a href="help.html" class="text-muted small ms-2" title="Help"><i class="fas fa-question-circle"></i> Help</a>
        </div>
        <div style="position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 1.1rem; color: #0f3460;">QuoteDr.io</div>
        <div class="d-flex align-items-center gap-2">
            <span class="fw-bold small" id="userName"></span>
            <a href="settings.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-cog"></i> Settings
            </a>
        </div>
    </nav>
    <div class="container py-4">

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-primary">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total Quotes</h5>
                        <p class="display-6" id="totalQuotesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-success">
                    <div class="card-body text-center">
                        <h5 class="card-title">Accepted</h5>
                        <p class="display-6" id="acceptedQuotesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-warning">
                    <div class="card-body text-center">
                        <h5 class="card-title">In Review</h5>
                        <p class="display-6" id="inReviewCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card border-info">
                    <div class="card-body text-center">
                        <h5 class="card-title">Revenue</h5>
                        <p class="display-6" id="totalRevenue">$0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quotes List -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h3 class="mb-0">Recent Quotes</h3>
                        <button class="btn btn-outline-secondary btn-sm" onclick="loadQuotes()" title="Refresh quotes"><i class="fas fa-sync-alt"></i></button>
                        <div class="d-flex gap-2 flex-wrap">
                            <button class="btn btn-sm btn-outline-secondary" onclick="refreshQuotes()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="exportQuotesToCSV()">
                                <i class="fas fa-file-export"></i> Export CSV
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Search and Filter Bar -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-2 mb-md-0">
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="fas fa-search text-muted"></i>
                                    </span>
                                    <input type="text" id="searchInput" class="form-control" placeholder="Search by client name or quote number..." oninput="filterQuotes()">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select id="statusFilter" class="form-select" onchange="filterQuotes()">
                                    <option value="all">All Statuses</option>
                                    <option value="draft">Draft</option>
                                    <option value="sent">Sent</option>
                                    <option value="accepted">Accepted</option>
                                    <option value="invoiced">Invoiced</option>
                                    <option value="declined">Declined</option>
                                </select>
                            </div>
                            <div class="col-md-3 text-md-end">
                                <span id="filteredCount" class="text-muted small"></span>
                            </div>
                        </div>

                        
            <!-- View Toggle -->
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="btn-group btn-group-sm" id="viewToggle">
    <button class="btn btn-primary" id="listViewBtn" onclick="setView('list')"><i class="fas fa-list me-1"></i>List</button>
    <button class="btn btn-outline-primary" id="kanbanViewBtn" onclick="setView('kanban')"><i class="fas fa-columns me-1"></i>Board</button>
</div>
            </div>

            <div id="quotesList">
                            <!-- Quotes will be rendered here -->
                        </div>
            <div id="kanbanBoard" style="display:none; overflow-x:auto;">
    <div class="d-flex gap-3 pb-3" style="min-width:900px;" id="kanbanColumns"></div>
</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-5 text-center text-muted small">
            <p>QuoteDr.io - Professional Quoting & Invoicing Software</p>
            <p class="mt-2">
                <a href="terms.html" class="text-decoration-none text-muted">Terms</a> | 
                <a href="privacy.html" class="text-decoration-none text-muted">Privacy Policy</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-v2.js"></script>
    <script>
        // ─── DASHBOARD FUNCTIONS ─────────────────────────────────────────────────────

        let allQuotes = []; // Store all quotes for client-side filtering

        async function refreshQuotes() {
            try {
                const { data, error } = await listQuotesFromSupabase();
                if (error === 'Not authenticated') {
                    // Retry after delay — session may not be ready yet
                    setTimeout(async function() {
                        const retry = await listQuotesFromSupabase();
                        if (!retry.error) {
                            allQuotes = autocleanDuplicates(retry.data || []);
                            renderQuotes(allQuotes);
                            updateStats(allQuotes);
                        } else {
                            document.getElementById('quotesList').innerHTML = '<div class="alert alert-warning">Please <a href="login.html">log in</a> to see your quotes.</div>';
                        }
                    }, 1500);
                    return;
                }
                if (error) throw error;
                allQuotes = autocleanDuplicates(data || []);
                renderQuotes(allQuotes);
                updateStats(allQuotes);
            } catch (err) {
                console.error('Error loading quotes:', err.message || err);
                document.getElementById('quotesList').innerHTML = '<div class="alert alert-danger">Error loading quotes: ' + (err.message || err) + '</div>';
            }
        }

        function updateStats(quotes) {
            const total = quotes.length;
            const accepted = quotes.filter(q => q.status === 'accepted').length;
            const inReview = quotes.filter(q => q.status === 'in_review').length;
            const revenue = quotes.reduce((sum, q) => sum + (parseFloat(q.total) || 0), 0);

            document.getElementById('totalQuotesCount').textContent = total;
            document.getElementById('acceptedQuotesCount').textContent = accepted;
            document.getElementById('inReviewCount').textContent = inReview;
            document.getElementById('totalRevenue').textContent = '$' + revenue.toLocaleString('en-CA', {minimumFractionDigits:0, maximumFractionDigits:0});
        }

        function autocleanDuplicates(data) {
            var seen = {};
            var toDelete = [];
            (data || []).forEach(function(q) {
                if (q.status !== 'draft') return;
                var key = (q.client_name || '') + '|' + (q.quote_number || '');
                if (!key || key === '|') return;
                if (seen[key]) {
                    if (new Date(q.updated_at) > new Date(seen[key].updated_at)) {
                        toDelete.push(seen[key].id);
                        seen[key] = q;
                    } else {
                        toDelete.push(q.id);
                    }
                } else {
                    seen[key] = q;
                }
            });
            if (toDelete.length > 0) {
                console.log('Auto-deleting', toDelete.length, 'duplicate drafts:', toDelete);
                _supabase.from('quotes').delete().in('id', toDelete).then(function() {
                    console.log('Duplicates cleaned up');
                });
                data = data.filter(function(q) { return toDelete.indexOf(q.id) === -1; });
            }
            return data;
        }

        function renderQuotes(quotes) {
            window.currentQuotes = quotes; // keep kanban in sync
            const el = document.getElementById('quotesList');
            if (!quotes.length) {
                el.innerHTML = `<div class="text-center py-5">
                    <i class="fas fa-file-invoice fa-4x mb-4" style="color:#1a56a0; opacity:0.3;"></i>
                    <h4 style="color:#444;">No quotes yet</h4>
                    <p class="text-muted mb-4">Start building your first professional quote — it only takes a minute.</p>
                    <a href="quote-builder.html" class="btn btn-lg" style="background:#e87e2a; color:#fff; font-weight:600;">
                        <i class="fas fa-plus me-2"></i>Build Your First Quote
                    </a>
                </div>`;
                return;
            }
            // Pin last opened quote to top
            var lastOpenedId = localStorage.getItem('ald_active_quote_id');
            var sorted = quotes.slice();
            if (lastOpenedId) {
                sorted.sort(function(a, b) {
                    if (a.id === lastOpenedId) return -1;
                    if (b.id === lastOpenedId) return 1;
                    return 0;
                });
            }
            el.innerHTML = sorted.map(q => `
                <div class="quote-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div onclick="openQuote('${q.id}')" style="flex:1; cursor:pointer;">
                            ${q.id === lastOpenedId ? '<span class="badge bg-primary me-1" style="font-size:0.65rem; vertical-align:middle;">Last Opened</span>' : ''}
                            <div class="fw-bold">${q.client_name || 'Unnamed Client'}</div>
                            <div class="text-muted small">${q.quote_number ? '#' + q.quote_number + ' · ' : ''}${formatDate(q.quote_date)} · Updated ${timeAgo(q.updated_at)}</div>
                        </div>
                        <div class="text-end d-flex flex-column align-items-end gap-1">
                            <div class="fw-bold">$${parseFloat(q.total || 0).toFixed(2)}</div>
                            <select class="status-select status-${q.status}" onchange="updateQuoteStatus('${q.id}', this.value)">
                                <option value="draft" ${q.status === 'draft' ? 'selected' : ''}>Draft</option>
                                <option value="sent" ${q.status === 'sent' ? 'selected' : ''}>Sent</option>
                                <option value="viewed" ${q.status === 'viewed' ? 'selected' : ''}>👁 Viewed</option>
                                <option value="in_review" ${q.status === 'in_review' ? 'selected' : ''}>🔄 In Review</option>
                                <option value="accepted" ${q.status === 'accepted' ? 'selected' : ''}>✅ Accepted</option>
                                <option value="invoiced" ${q.status === 'invoiced' ? 'selected' : ''}>Invoiced</option>
                                <option value="declined" ${q.status === 'declined' ? 'selected' : ''}>Declined</option>
                            </select>
                            <button class="btn btn-outline-danger" onclick="deleteQuote('${q.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    ${q.status === 'in_review' ? `
                    <button class="btn btn-warning btn-sm w-100 mt-2" onclick="openNotesReview('${q.id}', '${(q.client_name || '').replace(/'/g, "\\'")}')"><i class="fas fa-comments me-1"></i> Review Client Notes</button>` : ''}
                    <button class="btn btn-outline-info btn-sm w-100 mt-1" onclick="shareClientPortal('${(q.client_name || '').replace(/'/g, "\\'")}')" title="Share client portal"><i class="fas fa-external-link-alt me-1"></i> Client Portal</button>
                    ${(q.status === 'sent' || q.status === 'viewed') ? `
                    <button class="btn btn-outline-primary btn-sm w-100 mt-1" onclick="sendFollowUpReminder('${q.id}', '${(q.client_name || '').replace(/'/g, "\\'")}'", '${(q.data && q.data.clientEmail) || ''}')"><i class="fas fa-bell me-1"></i> Send Follow-up</button>` : ''}
                </div>
            `).join('');
        }

        function filterQuotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allQuotes.filter(quote => {
                const matchesSearch = !searchTerm ||
                    (quote.client_name && quote.client_name.toLowerCase().includes(searchTerm)) ||
                    (quote.quote_number && quote.quote_number.toLowerCase().includes(searchTerm));
                const matchesStatus = statusFilter === 'all' || quote.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            renderQuotes(filtered);
            document.getElementById('filteredCount').textContent = filtered.length > 0 ? `${filtered.length} quote${filtered.length !== 1 ? 's' : ''} found` : '';
        }

        function openQuote(quoteId) {
            window.location.href = 'quote-builder.html?load=' + quoteId;
        }

        var currentNotesQuoteId = null;

        async function openNotesReview(quoteId, clientName) {
            currentNotesQuoteId = quoteId;
            document.getElementById('notesReviewClientName').textContent = clientName || 'Client';
            document.getElementById('notesReviewBody').innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            var modal = bootstrap.Modal.getInstance(document.getElementById('notesReviewModal')) || new bootstrap.Modal(document.getElementById('notesReviewModal'));
            modal.show();
            try {
                var res = await _supabase.from('quotes').select('data, client_name, total').eq('id', quoteId).single();
                if (res.error || !res.data) throw new Error('Could not load quote');
                var qd = res.data.data || {};
                var roomNotes = qd._roomNotes || {};
                var rooms = qd.rooms || [];
                var upgrades = qd._clientUpgrades || [];
                var removals = qd._clientRemovals || [];
                var submittedAt = qd._clientSubmittedAt;
                var hasNotes = Object.values(roomNotes).some(function(n) { return n && n.trim(); });
                var hasChanges = upgrades.length > 0 || removals.length > 0;

                if (!hasNotes && !hasChanges) {
                    document.getElementById('notesReviewBody').innerHTML = '<p class="text-muted text-center py-3">No notes or changes found for this quote.</p>';
                    return;
                }

                var html = '';
                if (submittedAt) html += '<p class="text-muted small mb-3"><i class="fas fa-clock me-1"></i>Submitted ' + new Date(submittedAt).toLocaleString() + '</p>';

                // Upgrades section
                if (upgrades.length > 0) {
                    html += '<div class="card mb-3 border-success"><div class="card-header py-2" style="background:#d1e7dd;"><strong><i class="fas fa-arrow-up me-2 text-success"></i>Client Selected Upgrades</strong></div><div class="card-body py-2">';
                    upgrades.forEach(function(u) {
                        html += '<div class="d-flex justify-content-between align-items-center py-1 border-bottom"><div><strong>' + u.room + ':</strong> ' + u.from + ' → <span class="text-success fw-bold">' + u.to + '</span></div><div class="text-success fw-bold">+$' + parseFloat(u.diff || 0).toFixed(2) + '</div></div>';
                    });
                    var upgradeTotal = upgrades.reduce(function(s, u) { return s + parseFloat(u.diff || 0); }, 0);
                    html += '<div class="d-flex justify-content-between pt-2"><strong>Upgrade Total</strong><strong class="text-success">+$' + upgradeTotal.toFixed(2) + '</strong></div>';
                    html += '</div></div>';
                }

                // Removals section
                if (removals.length > 0) {
                    html += '<div class="card mb-3 border-danger"><div class="card-header py-2" style="background:#f8d7da;"><strong><i class="fas fa-times-circle me-2 text-danger"></i>Client Removed Items</strong></div><div class="card-body py-2">';
                    removals.forEach(function(r) {
                        html += '<div class="py-1 border-bottom"><strong>' + r.room + ':</strong> <s class="text-danger">' + r.item + '</s></div>';
                    });
                    html += '</div></div>';
                }

                // Notes section
                if (hasNotes) {
                    Object.entries(roomNotes).forEach(function(entry) {
                        var idx = entry[0], note = entry[1];
                        if (!note || !note.trim()) return;
                        var roomName = (rooms[parseInt(idx)] && rooms[parseInt(idx)].name) || ('Room ' + (parseInt(idx)+1));
                        html += '<div class="card mb-3 border-warning"><div class="card-header py-2" style="background:#fff3cd;"><strong><i class="fas fa-comment me-2"></i>' + roomName + ' — Client Note</strong></div><div class="card-body py-3"><p class="mb-2" style="white-space:pre-wrap;">' + note.trim() + '</p><button class="btn btn-outline-secondary btn-sm" onclick="copyNoteText(this, ' + JSON.stringify(roomName + ': ' + note.trim()) + ')"><i class="fas fa-copy me-1"></i>Copy</button></div></div>';
                    });
                }

                document.getElementById('notesReviewBody').innerHTML = html;
            } catch(e) {
                document.getElementById('notesReviewBody').innerHTML = '<p class="text-danger">Error loading: ' + e.message + '</p>';
            }
        }

        function openQuoteWithNotes(quoteId) {
            window.open('quote-builder.html?load=' + quoteId + '&shownotes=1', '_blank');
        }

        async function markAsResolved(quoteId) {
            if (!confirm('Mark this quote as resolved?')) return;
            await updateQuoteStatus(quoteId, 'sent');
            var modal = bootstrap.Modal.getInstance(document.getElementById('notesReviewModal'));
            if (modal) modal.hide();
        }

        async function shareClientPortal(clientName) {
            const { data } = await _supabase.auth.getSession();
            const userId = data?.session?.user?.id;
            if (!userId) { alert('Please log in first.'); return; }
            const url = `https://quotedr.io/client-portal.html?client=${encodeURIComponent(clientName)}&contractor=${userId}`;
            await navigator.clipboard.writeText(url).catch(() => {});
            alert('Client portal link copied to clipboard!\n\n' + url);
        }

        async function sendFollowUpReminder(quoteId, clientName, savedEmail) {
            var quote = allQuotes.find(function(q) { return q.id === quoteId; });
            if (!quote) return;
            var clientEmail = prompt('Send follow-up reminder to:', savedEmail || '');
            if (!clientEmail || !clientEmail.includes('@')) { if (clientEmail !== null) alert('Invalid email'); return; }
            var viewerUrl = window.location.origin + '/interactive-quote-viewer.html?id=' + quoteId;
            var btn = event.target.closest('button');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Sending...'; }
            try {
                var res = await fetch('https://axmoffknvblluibuitrq.supabase.co/functions/v1/send-quote-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4bW9mZmtudmJsbHVpYnVpdHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI0ODAsImV4cCI6MjA5MTQ0ODQ4MH0.SULFrXCwoABe9w4J_MBNQq6HQfzx2Sns-11uxGZYAso' },
                    body: JSON.stringify({ to: clientEmail, clientName: clientName, contractorName: '', companyName: '', quoteNumber: quote.quote_number || '', total: quote.total || 0, quoteUrl: viewerUrl, message: (function(){ try { var ns = JSON.parse(localStorage.getItem('ald_notification_settings') || '{}'); return ns.followupMessage || "Just following up on the quote I sent you! Let me know if you have any questions or if you're ready to proceed."; } catch(e) { return "Just following up on the quote I sent you!"; } })() })
                });
                var data = await res.json();
                if (data.error) throw new Error(data.error);
                if (btn) { btn.innerHTML = '<i class="fas fa-check me-1"></i>Sent!'; setTimeout(function() { btn.disabled = false; btn.innerHTML = '<i class="fas fa-bell me-1"></i> Send Follow-up'; }, 3000); }
            } catch(e) {
                alert('Failed to send: ' + e.message);
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-bell me-1"></i> Send Follow-up'; }
            }
        }

        function copyNoteText(btn, text) {
            navigator.clipboard.writeText(text).then(function() {
                var orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check me-1"></i>Copied!';
                setTimeout(function() { btn.innerHTML = orig; }, 1500);
            });
        }

        async function updateQuoteStatus(quoteId, newStatus) {
            const quote = allQuotes.find(q => q.id === quoteId);
            if (quote) {
                quote.status = newStatus;
                renderQuotes(allQuotes);
                updateStats(allQuotes);
            }
            try {
                const { error } = await _supabase
                    .from('quotes')
                    .update({ status: newStatus, updated_at: new Date().toISOString() })
                    .eq('id', quoteId);
                if (error) console.error('Status update error:', error);
            } catch(e) { console.warn('Could not update status in Supabase:', e); }
        }

        async function deleteQuote(quoteId) {
            if (!confirm('Are you sure you want to delete this quote?')) return;

            const result = await deleteQuoteFromSupabase(quoteId);
            if (result && result.error) {
                console.error('Error deleting quote:', result.error);
                alert('Failed to delete quote: ' + (result.error.message || result.error));
                return;
            }
            allQuotes = allQuotes.filter(q => q.id !== quoteId);
            renderQuotes(allQuotes);
            updateStats(allQuotes);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        // Load user name
        document.addEventListener('DOMContentLoaded', async () => {
            const userName = localStorage.getItem('ald_user_name') || 'User';
            document.getElementById('userName').textContent = userName;

            // Load quotes — retry up to 3 times to handle auth session warmup
            var attempts = 0;
            async function loadWithRetry() {
                attempts++;
                var result = await listQuotesFromSupabase();
                if (result.error === 'Not authenticated' && attempts < 3) {
                    setTimeout(loadWithRetry, 800 * attempts);
                } else if (!result.error) {
                    allQuotes = autocleanDuplicates(result.data || []);
                    renderQuotes(allQuotes);
                    updateStats(allQuotes);
                } else {
                    document.getElementById('quotesList').innerHTML = '<div class="alert alert-warning">Please <a href="login.html">log in</a> to see your quotes.</div>';
                }
            }
            loadWithRetry();
        });
    </script>

    <script>
        // === KANBAN VIEW ===
        window.currentQuotes = [];
                
                function setView(mode) {
                    if (mode === 'list') {
                        document.getElementById('quotesList').style.display = 'block';
                        document.getElementById('kanbanBoard').style.display = 'none';
                        document.getElementById('listViewBtn').classList.add('btn-primary');
                        document.getElementById('listViewBtn').classList.remove('btn-outline-primary');
                        document.getElementById('kanbanViewBtn').classList.add('btn-outline-primary');
                        document.getElementById('kanbanViewBtn').classList.remove('btn-primary');
                    } else {
                        document.getElementById('quotesList').style.display = 'none';
                        document.getElementById('kanbanBoard').style.display = 'block';
                        document.getElementById('listViewBtn').classList.add('btn-outline-primary');
                        document.getElementById('listViewBtn').classList.remove('btn-primary');
                        document.getElementById('kanbanViewBtn').classList.add('btn-primary');
                        document.getElementById('kanbanViewBtn').classList.remove('btn-outline-primary');
                        renderKanban(window.currentQuotes);
                    }
                    localStorage.setItem('ald_dashboard_view', mode);
                }
                
                function renderKanban(quotes) {
                    const columns = [
                        { status: 'draft', label: 'Draft', color: '#6c757d', icon: 'fa-pencil' },
                        { status: 'sent', label: 'Sent', color: '#0d6efd', icon: 'fa-paper-plane' },
                        { status: 'viewed', label: 'Viewed', color: '#6f42c1', icon: 'fa-eye' },
                        { status: 'in_review', label: 'In Review', color: '#ffc107', icon: 'fa-comments' },
                        { status: 'accepted', label: 'Accepted', color: '#198754', icon: 'fa-check-circle' },
                        { status: 'invoiced', label: 'Invoiced', color: '#fd7e14', icon: 'fa-file-invoice-dollar' },
                        { status: 'paid', label: 'Paid', color: '#006400', icon: 'fa-dollar-sign' }
                    ];
                
                    const kanbanColumns = document.getElementById('kanbanColumns');
                    kanbanColumns.innerHTML = '';
                
                    columns.forEach(col => {
                        const statusQuotes = quotes.filter(q => q.status === col.status);
                        const countBadge = `<span class="badge bg-white text-dark ms-1">${statusQuotes.length}</span>`;
                        
                        let cardsHtml = '';
                        if (statusQuotes.length === 0) {
                            cardsHtml = '<div class="text-center text-muted small py-3">No quotes</div>';
                        } else {
                            statusQuotes.forEach(q => {
                                const timeAgo = getTimeAgo(q.updated_at);
                                cardsHtml += `
                                    <div class="kanban-card mb-2 p-2 bg-white rounded shadow-sm" style="cursor:pointer; border-left:3px solid ${col.color};" onclick="openQuote('${q.id}')">
                                        <div class="fw-semibold small">${q.client_name}</div>
                                        <div class="text-muted" style="font-size:0.75rem;">#${q.quote_number} · $${q.total}</div>
                                        <div class="text-muted" style="font-size:0.7rem;">${timeAgo}</div>
                                    </div>
                                `;
                            });
                        }
                
                        const columnHtml = `
                            <div class="kanban-col" style="min-width:200px; max-width:220px;">
                                <div class="kanban-col-header" style="background:${col.color}; color:white; border-radius:8px 8px 0 0; padding:8px 12px;">
                                    <i class="fas ${col.icon} me-1"></i>${col.label} ${countBadge}
                                </div>
                                <div class="kanban-col-body" style="background:#f8f9fa; border:1px solid #dee2e6; border-top:none; border-radius:0 0 8px 8px; padding:8px; min-height:200px;">
                                    ${cardsHtml}
                                </div>
                            </div>
                        `;
                        kanbanColumns.innerHTML += columnHtml;
                    });
                }
                
                function getTimeAgo(dateString) {
                    const date = new Date(dateString);
                    const now = new Date();
                    const diffInHours = Math.floor((now - date) / (1000 * 60 * 60));
                    
                    if (diffInHours < 24) {
                        return `${diffInHours}h ago`;
                    } else {
                        return date.toLocaleDateString();
                    }
                }
                

    </script>
