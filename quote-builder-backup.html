<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALD Direct Inc. - Quote Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .room-header { 
            background: linear-gradient(135deg, #74b9ff 0%, #0652DD 100%);
            color: white;
            padding: 1rem;
            margin-top: 1.5rem;
            border-radius: 8px;
        }
        .room-header h3 { margin: 0; font-weight: bold; }
        .line-item { 
            background: white;
            border-left: 4px solid #667eea;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
        }
        .room-total { 
            font-size: 1.2rem;
            font-weight: bold;
            color: #28a745;
        }
        .grand-total {
            background: #343a40;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        /* Hide markup controls when printing for client view */
        @media print {
            .room-header > div:not(:first-child) {
                display: none !important;
            }
            [id^="markupControls_"] {
                display: none !important;
            }
        }
    </style>
    <script src="analytics.js?v=1778059000"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Professional Header with Logo -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                    <img src="ald-logo.svg" alt="ALD Direct Inc." style="height: 100px; margin-right: 20px; max-width: none; display: block;">
                    <div>
                        <h2 class="mb-0" style="color: #2c3e50;">ALD Direct Inc.</h2>
                        <p class="text-muted mb-0">Professional Renovation Services</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 text-end">
                <div class="mb-2">
                    <button onclick="saveQuote()" class="btn btn-warning me-1 shadow-sm" title="Save quote (Ctrl+S)">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button onclick="loadQuoteFromFile()" class="btn btn-secondary me-1 shadow-sm" title="Open a saved quote">
                        <i class="fas fa-folder-open"></i> Open
                    </button>
                    <button onclick="exportToPDF()" class="btn btn-success me-1 shadow-sm">
                        <i class="fas fa-download"></i> PDF
                    </button>
                    <button onclick="generateInteractiveLink()" class="btn btn-primary shadow-sm">
                        <i class="fas fa-share-square"></i> Send Quote
                    </button>
                </div>
                <div id="saveStatus" class="text-muted small" style="min-height: 1.2em;"></div>
            </div>
        </div>

        <!-- Client Info -->
        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-user"></i> Client Information</div>
            <div class="card-body">
                <div class="row">
                    <!-- Client Information Section -->
                    <div class="col-md-12 autocomplete-container">
                        <label><strong>Client Name (Type to search from past quotes):</strong></label>
                        <input type="text" id="clientName" class="form-control" placeholder="Start typing client name..."
                               onkeyup="showClientSuggestions()" onblur="hideClientDropdown()">
                        <div id="clientDropdown" class="autocomplete-dropdown"></div>
                    </div>
                    
                    <!-- Terms & Conditions Section -->
                    <div class="col-md-12 mt-3">
                        <label><strong>Terms & Conditions:</strong></label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termDeposit" value="50% deposit required before work begins">
                            <label class="form-check-label" for="termDeposit">
                                50% deposit required before work begins
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termTimeline" value="2-week timeline estimate (subject to change)">
                            <label class="form-check-label" for="termTimeline">
                                2-week timeline estimate (subject to change)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termWarranty" value="1-year workmanship warranty on all labor">
                            <label class="form-check-label" for="termWarranty">
                                1-year workmanship warranty on all labor
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termPayment30" value="Payment due within 30 days of completion">
                            <label class="form-check-label" for="termPayment30">
                                Payment due within 30 days of completion
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termChanges" value="Change orders must be in writing and may affect timeline/cost">
                            <label class="form-check-label" for="termChanges">
                                Change orders must be in writing (may affect timeline/cost)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termAccess" value="Client to provide access to property during agreed work hours">
                            <label class="form-check-label" for="termAccess">
                                Client to provide access during agreed work hours
                            </label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 mt-3">
                        <label><strong>Project Address:</strong></label>
                        <input type="text" id="projectAddress" class="form-control" placeholder="123 Main St, Toronto">
                    </div>
                    
                    <div class="col-md-6 mt-3">
                        <label><strong>Phone Number:</strong></label>
                        <input type="tel" id="clientPhone" class="form-control" placeholder="(416) 555-0123">
                    </div>
                    
                    <div class="col-md-12 mt-3">
                        <label><strong>Email Address:</strong></label>
                        <input type="email" id="clientEmail" class="form-control" placeholder="client@email.com">
                    </div>
                </div>
            </div>
        </div>

        <!-- Room Breaks Section -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-th-large"></i> Quote by Room/Area</span>
                <div class="btn-group" role="group">
                    <button onclick="addRoom()" class="btn btn-sm btn-light text-dark">
                        <i class="fas fa-plus"></i> Add Room
                    </button>
                    <button onclick="saveTemplate()" class="btn btn-sm btn-info text-white" title="Save current rooms as a template">
                        <i class="fas fa-save"></i> Save Template
                    </button>
                    <button onclick="loadTemplatesDropdown()" class="btn btn-sm btn-warning" title="Load existing templates">
                        <i class="fas fa-folder-open"></i> Templates
                    </button>
                    <button id="toggleTimelinesBtn" onclick="toggleTimelines()" class="btn btn-sm btn-secondary" title="Show/hide timeline estimates">
                        <i class="fas fa-eye-slash"></i> Hide Timelines
                    </button>
                    <button onclick="applyGlobalMarkup()" class="btn btn-sm btn-success text-white" title="Apply markup to all rooms">
                        <i class="fas fa-percent"></i> Markup All
                    </button>
                </div>
            </div>
            <div class="card-body" id="roomsContainer">
                <!-- Rooms will be added here dynamically -->
            </div>
        </div>

        <!-- Draft & Recent Quotes Section -->
        <div id="draftSectionContainer" style="display: none;" class="card mb-4">
            <div class="card-header bg-light">
                <span><i class="fas fa-file-medical"></i> Your Work</span>
            </div>
            <div class="card-body">
                <button onclick="saveCurrentQuoteAsDraft()" class="btn btn-sm btn-success me-2">
                    <i class="fas fa-save"></i> Save Current Quote
                </button>
                <button onclick="loadRecentQuotes()" class="btn btn-sm btn-primary">
                    <i class="fas fa-history"></i> Load Recent Quotes
                </button>
            </div>
        </div>

        <!-- Pricing Summary -->
        <div class="row">
            <div class="col-md-6">
                <div class="grand-total text-center">
                    <h4><i class="fas fa-calculator"></i> Quote Total</h4>
                    <div id="subtotalDisplay" style="font-size: 1.5rem;">Subtotal: $0.00</div>
                    <div id="taxDisplay" style="font-size: 1.2rem;">HST (13%): $0.00</div>
                    <div id="grandTotalDisplay" style="font-size: 2rem; font-weight: bold; margin-top: 0.5rem;">TOTAL: $0.00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Room Modal -->
    <div class="modal fade" id="addRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Room/Area Break</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label><strong>Room Name:</strong></label>
                    <input type="text" id="newRoomName" class="form-control mb-3" placeholder="e.g., Basement, Kitchen, Bathroom">
                    <small class="text-muted">Common examples: Basement, Kitchen, Bathroom, Master Bedroom, Garage</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="confirmAddRoom()">Add Room Break</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Line Item Modal -->
    <div class="modal fade" id="addLineModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Line Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="currentRoomId">
                    
                    <label><strong>Description:</strong></label>
                    <input type="text" id="lineDescription" class="form-control mb-3" placeholder="e.g., 2x4 Wall Framing, Drywall Hang & Finish">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label><strong>Category:</strong></label>
                            <select id="lineCategory" class="form-select" onchange="updatePricingOptions()">
                                <option value="Framing">Framing</option>
                                <option value="Subflooring">Subflooring</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Plumbing">Plumbing</option>
                                <option value="HVAC">HVAC</option>
                                <option value="Insulation">Insulation</option>
                                <option value="Drywall">Drywall</option>
                                <option value="Painting">Painting</option>
                                <option value="Doors & Trim">Doors & Trim</option>
                                <option value="Tiling">Tiling</option>
                                <option value="Flooring">Flooring</option>
                                <option value="Carpentry">Carpentry</option>
                                <option value="Demolition">Demolition</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label><strong>Service:</strong></label>
                            <select id="lineService" class="form-select" onchange="autoFillPricing()">
                                <!-- Options will populate based on category -->
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label><strong>Unit Type:</strong></label>
                            <input type="text" id="lineUnitType" class="form-control" placeholder="LF, sq ft, each, hourly">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label><strong>Quantity:</strong></label>
                            <input type="number" id="lineQuantity" class="form-control" value="1" step="0.01">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label><strong>Rate ($):</strong></label>
                            <input type="number" id="lineRate" class="form-control" value="0" step="0.01">
                        </div>
                    </div>

                    <label><strong>Notes (Optional):</strong></label>
                    <textarea id="lineNotes" class="form-control mb-3" rows="2" placeholder="Additional details..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="confirmAddLine()">Add Line Item</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Pricing Database - Adam's Rates (ALD Direct Inc. 2026)
        const pricingDatabase = {
            'Framing': [
                { name: '2x4 Wall Framing', unitType: 'LF', rate: 14.60 },

            ],
            'Subflooring': [
                { name: '1/2" OSB Subfloor', unitType: 'sheet', rate: 2.15 },
                { name: '5/8" OSB Subfloor', unitType: 'sheet', rate: 2.50 },
                { name: '3/4" OSB Subfloor', unitType: 'sheet', rate: 2.75 },
                { name: 'Subfloor (Linear)', unitType: 'LF', rate: 1.45 }
            ],
            'Electrical': [
                { name: 'Standard Electrical Work', unitType: 'hourly', rate: 100.00 },
                { name: 'Recessed Tilt Lights', unitType: 'each', rate: 80.00 },
                { name: 'Regular Recessed Pots', unitType: 'each', rate: 30.00 },
                { name: 'Under Cabinet Lighting', unitType: 'base + each', rate: 200.00, note: '$200 base + $100/extra location' },
                { name: 'Standard Light Fixture Replacement', unitType: 'each', rate: 75.00 },
                { name: 'Add Receptacle 15A (existing circuit)', unitType: 'each', rate: 70.00 },
                { name: 'Add GFCI 15A (existing circuit)', unitType: 'each', rate: 95.00 },
                { name: 'Install Ceiling Fan & Mount', unitType: 'each', rate: 150.00 },
                { name: 'Extractor Fan + Roof Vent (<80 sq ft)', unitType: 'each', rate: 450.00 },
                { name: 'Extractor Fan + Roof Vent (<100 sq ft)', unitType: 'each', rate: 520.00 },
                { name: 'Extractor Fan + Roof Vent (<140 sq ft)', unitType: 'each', rate: 605.00 },
                { name: 'TV Mount', unitType: 'each', rate: 175.00 },
                { name: 'Doorbell Camera Install', unitType: 'each', rate: 200.00 }
            ],
            'Plumbing': [
                { name: 'Standard Plumbing Work', unitType: 'hourly', rate: 100.00 },
                { name: 'Solder Shut-off', unitType: 'each', rate: 150.00 },
                { name: 'PEX Shut-off', unitType: 'each', rate: 125.00 },
                { name: 'Toilet Replacement', unitType: 'each', rate: 250.00 },
                { name: 'Shower Rough-in', unitType: 'each', rate: 1000.00 },
                { name: 'Toilet Install Only', unitType: 'each', rate: 200.00 },
                { name: 'Tub Installation', unitType: 'each', rate: 600.00 },
                { name: 'Kitchen Sink Cutout, Mount + Fixtures', unitType: 'each', rate: 400.00 },
                { name: 'Dishwasher Replacement', unitType: 'each', rate: 300.00 },
                { name: 'New Dishwasher Install', unitType: 'each', rate: 400.00 },
                { name: 'Sink Faucet Installation', unitType: 'each', rate: 200.00 }
            ],
            'HVAC': [
                { name: 'HVAC Work', unitType: 'hourly', rate: 100.00 },
                { name: 'Heat Run (6" supply)', unitType: 'LF', rate: 20.00, note: 'NO GRILLS' },
                { name: 'Flat Minimum Heat Run', unitType: 'minimum', rate: 75.00 },
                { name: 'Floor Vent Framed (M+L)', unitType: 'each', rate: 190.00 },
                { name: 'Floor Vent Framed TILE', unitType: 'each', rate: 260.00 },
                { name: 'Floor Vent Frameless (M+L)', unitType: 'each', rate: 245.00 },
                { name: 'Drywall Vent C.A.R. Large', unitType: 'each', rate: 290.00 }
            ],
            'Insulation': [
                { name: 'Batts Install Labor Only', unitType: 'sq ft', rate: 1.00, note: 'Materials extra' },
                { name: 'Vapor Barrier Install', unitType: 'sq ft', rate: 1.00 },
                { name: 'R14 Insulation (2x4 studs)', unitType: 'sq ft', rate: 2.00, note: '$3 with vapor' },
                { name: 'R22 Insulation', unitType: 'sq ft', rate: 2.70, note: '$3.70 with vapor' },
                { name: 'EPS Foam Panels (1.5")', unitType: 'sq ft', rate: 2.50 }
            ],
            'Drywall': [
                { name: 'Complete Service (Hang, Mud, Tape, Sand)', unitType: 'sq ft', rate: 6.40 },
                { name: '8\' Wall - ONE SIDE Complete', unitType: 'LF', rate: 65.80 },
                { name: "8' Wall - BOTH SIDES Complete", unitType: 'LF', rate: 117.00 }
            ],
            'Painting': [
                { name: 'General Painting (coverage area)', unitType: 'sq ft', rate: 1.75 },
                { name: 'Doors (2 coats)', unitType: 'each', rate: 150.00 },
                { name: 'Baseboards (2 coats)', unitType: 'LF', rate: 2.00 },
                { name: 'Crown Molding (2 coats)', unitType: 'LF', rate: 2.00 }
            ],
            'Doors & Trim': [
                { name: 'Standard Door Installation', unitType: 'each', rate: 500.00, note: '+$15 per glass panel' },
                { name: 'Solid Core Door Installation', unitType: 'each', rate: 600.00 },
                { name: '2-3/4" Trim (painted)', unitType: 'LF', rate: 5.50 },
                { name: '3-1/2" Trim', unitType: 'LF', rate: 6.15 },
                { name: '2-3/4" MDF (painted complete)', unitType: 'LF', rate: 9.45 }
            ],
            'Tiling': [
                { name: 'Floor Tile Installation', unitType: 'sq ft', rate: 8.00 },
                { name: 'Wall Tile Installation', unitType: 'sq ft', rate: 10.00 },
                { name: 'Backsplash Tile', unitType: 'sq ft', rate: 12.00 },
                { name: 'Shower Tile (walls + floor)', unitType: 'sq ft', rate: 14.00 },
                { name: 'Tile Removal', unitType: 'sq ft', rate: 3.00 }
            ],
            'Flooring': [
                { name: 'Laminate Installation', unitType: 'sq ft', rate: 3.50 },
                { name: 'Vinyl Plank (LVP) Installation', unitType: 'sq ft', rate: 4.00 },
                { name: 'Hardwood Installation', unitType: 'sq ft', rate: 6.00 },
                { name: 'Floor Leveling (Self-Leveler)', unitType: 'sq ft', rate: 5.00 },
                { name: 'Carpet Removal', unitType: 'sq ft', rate: 1.50 }
            ],
            'Carpentry': [
                { name: 'Custom Shelving', unitType: 'LF', rate: 45.00 },
                { name: 'Closet Build-out', unitType: 'each', rate: 800.00 },
                { name: 'Crown Molding Install', unitType: 'LF', rate: 8.00 },
                { name: 'Baseboard Install', unitType: 'LF', rate: 5.50 },
                { name: 'General Carpentry', unitType: 'hourly', rate: 75.00 }
            ],
            'Demolition': [
                { name: 'General Demo', unitType: 'hourly', rate: 65.00 },
                { name: 'Wall Removal (non-load-bearing)', unitType: 'each', rate: 500.00 },
                { name: 'Floor Removal', unitType: 'sq ft', rate: 2.00 },
                { name: 'Ceiling Removal', unitType: 'sq ft', rate: 2.50 },
                { name: 'Debris Removal / Dump Run', unitType: 'each', rate: 250.00 }
            ]
        };

        let rooms = [];
        let roomCounter = 0;
        
        // Timeline feature - show/hide toggle
        let showTimelines = true;
        
        function addRoom() {
            const modal = new bootstrap.Modal(document.getElementById('addRoomModal'));
            document.getElementById('newRoomName').value = '';
            modal.show();
        }

        function confirmAddRoom() {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) return;
            
            roomCounter++;
            rooms.push({
                id: roomCounter,
                name: name,
                items: []
            });
            
            renderRooms();
            
            // Close modal
            const modalEl = document.getElementById('addRoomModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
        }

        function addLine(roomId) {
            document.getElementById('currentRoomId').value = roomId;
            const modal = new bootstrap.Modal(document.getElementById('addLineModal'));
            
            // Reset form fields
            document.getElementById('lineDescription').value = '';
            document.getElementById('lineQuantity').value = '1';
            document.getElementById('lineRate').value = '0';
            document.getElementById('lineNotes').value = '';
            
            // Set default category to Framing and populate options
            document.getElementById('lineCategory').value = 'Framing';
            updatePricingOptions();
            
            modal.show();
        }

        function updatePricingOptions() {
            const category = document.getElementById('lineCategory').value;
            const serviceSelect = document.getElementById('lineService');
            
            // Clear existing options
            serviceSelect.innerHTML = '';
            
            // Get services for this category
            const services = pricingDatabase[category] || [];
            
            if (services.length === 0) {
                // No predefined services, add a generic option
                const option = document.createElement('option');
                option.value = 'custom';
                option.text = 'Custom Service';
                serviceSelect.appendChild(option);
            } else {
                // Add all services from database
                services.forEach(service => {
                    const option = document.createElement('option');
                    option.value = service.name;
                    option.text = service.name;
                    option.dataset.unitType = service.unitType;
                    option.dataset.rate = service.rate;
                    if (service.note) {
                        option.dataset.note = service.note;
                    }
                    serviceSelect.appendChild(option);
                });
            }
            
            // Auto-fill if first service selected
            if (services.length > 0) {
                autoFillPricing();
            }
        }

        function autoFillPricing() {
            const serviceSelect = document.getElementById('lineService');
            const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
            
            if (selectedOption && selectedOption.dataset.unitType) {
                // Auto-fill unit type and rate from database
                document.getElementById('lineUnitType').value = selectedOption.dataset.unitType;
                document.getElementById('lineRate').value = selectedOption.dataset.rate;
                
                // Also update description to match service name
                if (selectedOption.value !== 'custom') {
                    document.getElementById('lineDescription').value = selectedOption.text;
                }
            }
        }

        function confirmAddLine() {
            const roomId = parseInt(document.getElementById('currentRoomId').value);
            const description = document.getElementById('lineDescription').value.trim();
            const category = document.getElementById('lineCategory').value;
            const unitType = document.getElementById('lineUnitType').value.trim();
            const quantity = parseFloat(document.getElementById('lineQuantity').value) || 0;
            const rate = parseFloat(document.getElementById('lineRate').value) || 0;
            const notes = document.getElementById('lineNotes').value.trim();
            
            if (!description) return;
            
            const roomIndex = rooms.findIndex(r => r.id === roomId);
            if (roomIndex !== -1) {
                rooms[roomIndex].items.push({
                    description,
                    category,
                    unitType,
                    quantity,
                    rate,
                    notes,
                    total: quantity * rate
                });
                
                renderRooms();
                
                // Close modal
                const modalEl = document.getElementById('addLineModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
            }
        }

        function deleteRoom(roomId) {
            if (confirm('Delete this room? All items will be lost.')) {
                rooms = rooms.filter(r => r.id !== roomId);
                renderRooms();
            }
        }

        function deleteItem(roomId, itemIndex) {
            const room = rooms.find(r => r.id === roomId);
            if (room) {
                room.items.splice(itemIndex, 1);
                renderRooms();
            }
        }

        function calculateTotals() {
            let subtotal = 0;

            rooms.forEach(room => {
                const baseTotal = room.items.reduce((sum, item) => sum + item.total, 0);
                const markup = room.markup || 0;
                const roomTotal = baseTotal * (1 + markup / 100);
                room.roomTotal = roomTotal;
                subtotal += roomTotal;
            });

            const tax = subtotal * 0.13;
            const total = subtotal + tax;

            document.getElementById('subtotalDisplay').textContent = 'Subtotal: $' + subtotal.toFixed(2);
            document.getElementById('taxDisplay').textContent = 'HST (13%): $' + tax.toFixed(2);
            document.getElementById('grandTotalDisplay').textContent = 'TOTAL: $' + total.toFixed(2);
        }

        function renderRooms() {
            const container = document.getElementById('roomsContainer');
            
            if (rooms.length === 0) {
                container.innerHTML = '<div class="text-center py-4 text-muted"><p>No rooms yet. Add your first room break!</p></div>';
                calculateTotals();
                return;
            }
            
            let html = '';
            
            rooms.forEach(room => {
                // Apply room markup if set
                const roomMarkup = room.markup || 0;
                let roomTotal = room.items.reduce((sum, item) => sum + item.total, 0);
                if (roomMarkup > 0) {
                    roomTotal = roomTotal * (1 + roomMarkup / 100);
                }
                
                html += '<div class="room-header">';
                html += '<h3><i class="fas fa-door-open"></i> ' + room.name + '</h3>';
                html += '<p class="mb-0">' + room.items.length + ' items | Total: $' + roomTotal.toFixed(2) + '</p>';
                
                // Timeline input field (shown when showTimelines is true)
                if (showTimelines) {
                    const timelineValue = room.timeline || '';
                    html += '<div class="mt-2"><label><small>Timeline Estimate:</small></label><input type="text" id="timeline_' + room.id + '" class="form-control form-control-sm" value="' + timelineValue + '" placeholder="e.g., 1-2 weeks"></div>';
                }
                // Markup controls (hidden from client view)
                html += '<div class="mt-2 d-flex align-items-center gap-2" id="markupControls_' + room.id + '">';
                html += '<small><strong>Markup:</strong></small>';
                html += '<input type="number" id="roomMarkup_' + room.id + '" class="form-control form-control-sm" style="width: 80px;" value="' + roomMarkup + '" min="0" max="100" step="1" onchange="updateRoomMarkup(' + room.id + ', this.value)">';
                html += '<span>%</span>';
                html += '<button onclick="toggleMarkupVisibility(' + room.id + ')" class="btn btn-sm btn-outline-secondary" title="Toggle visibility to client"><i id="markupIcon_' + room.id + '" class="fas fa-eye"></i></button>';
                html += '</div>';
                html += '<button onclick="addLine(' + room.id + ')" class="btn btn-sm btn-light text-dark mt-1">';
                html += '<i class="fas fa-plus"></i> Add Item</button>';
                html += '<button onclick="deleteRoom(' + room.id + ')" class="btn btn-sm btn-danger mt-1">';
                html += '<i class="fas fa-trash"></i> Delete Room</button>';
                html += '</div>';
                
                if (room.items.length > 0) {
                    html += '<table class="table table-striped mb-3"><thead><tr><th>#</th><th>Description</th><th>Category</th><th>Qty</th><th>Rate</th><th>Total</th><th></th></tr></thead><tbody>';

                    const markupFactor = 1 + (room.markup || 0) / 100;

                    room.items.forEach((item, index) => {
                        const displayRate = item.rate * markupFactor;
                        const displayTotal = item.total * markupFactor;
                        html += '<tr>';
                        html += '<td>' + (index + 1) + '</td>';
                        html += '<td><strong>' + item.description + '</strong><br><small class="text-muted">' + (item.notes || '') + '</small></td>';
                        html += '<td>' + item.category + '</td>';
                        html += '<td>' + item.quantity + ' ' + (item.unitType || '') + '</td>';
                        html += '<td>$' + displayRate.toFixed(2) + '</td>';
                        html += '<td><strong>$' + displayTotal.toFixed(2) + '</strong></td>';
                        html += '<td><button onclick="deleteItem(' + room.id + ', ' + index + ')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button></td>';
                        html += '</tr>';
                    });

                    html += '</tbody></table>';
                } else {
                    html += '<p class="text-muted text-center py-2">No items yet.</p>';
                }
            });
            
            // Capture timeline values back into room data
            if (showTimelines) {
                rooms.forEach(room => {
                    const timelineInput = document.getElementById('timeline_' + room.id);
                    if (timelineInput) {
                        room.timeline = timelineInput.value.trim();
                    }
                });
            }
            
            container.innerHTML = html;
            calculateTotals();
            markUnsaved();
        }

        function updateSaveStatus(state, detail) {
            const el = document.getElementById('saveStatus');
            if (!el) return;
            const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (state === 'saved') {
                el.innerHTML = '<span style="color:#28a745;"><i class="fas fa-check-circle"></i> Saved at ' + t + (detail ? ' \u2014 ' + detail : '') + '</span>';
                unsavedChanges = false;
            } else if (state === 'unsaved') {
                el.innerHTML = '<span style="color:#fd7e14;"><i class="fas fa-circle"></i> Unsaved changes</span>';
            } else if (state === 'saving') {
                el.innerHTML = '<span style="color:#6c757d;"><i class="fas fa-spinner fa-spin"></i> Saving\u2026</span>';
            } else if (state === 'loaded') {
                el.innerHTML = '<span style="color:#667eea;"><i class="fas fa-folder-open"></i> Opened at ' + t + (detail ? ' \u2014 ' + detail : '') + '</span>';
                unsavedChanges = false;
            } else if (state === 'error') {
                el.innerHTML = '<span style="color:#dc3545;"><i class="fas fa-exclamation-triangle"></i> ' + (detail || 'Save failed') + '</span>';
            }
        }

        function markUnsaved() {
            if (!initDone) return;
            unsavedChanges = true;
            updateSaveStatus('unsaved');
        }

        async function writeToHandle(handle) {
            updateSaveStatus('saving');
            const writable = await handle.createWritable();
            await writable.write(JSON.stringify(collectQuoteData(), null, 2));
            await writable.close();
            updateSaveStatus('saved');
        }

        async function saveQuote() {
            if (!saveFileHandle) {
                try {
                    const client = document.getElementById('clientName')?.value.trim() || 'Quote';
                    const date = new Date().toISOString().slice(0, 10);
                    saveFileHandle = await window.showSaveFilePicker({
                        suggestedName: client + ' - ' + date + '.aldquote',
                        types: [{ description: 'ALD Quote File', accept: { 'application/json': ['.aldquote'] } }]
                    });
                    startAutoSave();
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    downloadQuoteFallback();
                    return;
                }
            }
            try {
                await writeToHandle(saveFileHandle);
            } catch (err) {
                updateSaveStatus('error', 'Could not write file');
            }
        }

        async function loadQuoteFromFile() {
            try {
                const [handle] = await window.showOpenFilePicker({
                    types: [{ description: 'ALD Quote File', accept: { 'application/json': ['.aldquote'] } }]
                });
                const file = await handle.getFile();
                const data = JSON.parse(await file.text());
                saveFileHandle = handle;
                applyQuoteData(data);
                startAutoSave();
                updateSaveStatus('loaded', handle.name);
            } catch (err) {
                if (err.name !== 'AbortError') updateSaveStatus('error', 'Could not open file');
            }
        }

        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(async () => {
                if (saveFileHandle && unsavedChanges) {
                    try { await writeToHandle(saveFileHandle); }
                    catch (err) { updateSaveStatus('error', 'Auto-save failed'); }
                }
            }, 3 * 60 * 1000);
        }

        function downloadQuoteFallback() {
            const blob = new Blob([JSON.stringify(collectQuoteData(), null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const client = document.getElementById('clientName')?.value.trim() || 'Quote';
            a.href = url;
            a.download = client + ' - ' + new Date().toISOString().slice(0, 10) + '.aldquote';
            a.click();
            URL.revokeObjectURL(url);
            updateSaveStatus('saved');
        }

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveQuote();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            ['clientName','projectAddress','clientPhone','clientEmail',
             'termDeposit','termTimeline','termWarranty','termPayment30','termChanges','termAccess'
            ].forEach(function(id) {
                const el = document.getElementById(id);
                if (el) el.addEventListener('change', markUnsaved);
            });
        });

        // ── End Save / Load ──────────────────────────────────────────────────────

        // Load templates from localStorage on startup
        let templates = JSON.parse(localStorage.getItem('ald_quote_templates') || '{}');
        
        // Initialize with one room

        updatePricingOptions();
        renderRooms();
        renderTemplateDropdown();
        initDone = true; // changes after this point are tracked
    </script>

        // Fuzzy matching function
        function fuzzyMatch(query, text) {
            query = query.toLowerCase().trim();
            text = text.toLowerCase().trim();
            
            if (query === text) return { score: 100, exact: true };
            if (text.includes(query)) return { score: 90, exact: false };
            
            const distances = [];
            for (let i = 0; i < text.length; i++) {
                let j = 0;
                while (j < query.length && text[i + j] === query[j]) {
                    j++;
                }
                if (j > 0) distances.push(j);
            }
            
            const maxMatch = Math.max(...distances, 0);
            return { score: (maxMatch / query.length) * 100, exact: false };
        }

        // Search clients based on input
        function searchClients(query) {
            if (!query || query.length < 2) return [];
            
            const results = [];
            for (const [clientName, data] of Object.entries(clientDatabase)) {
                const match = fuzzyMatch(query, clientName);
                if (match.score > 50) {
                    results.push({ name: clientName, ...data, score: match.score });
                }
            }
            return results.sort((a, b) => b.score - a.score);
        }
