<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBooks Connection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0"><i class="fas fa-link me-2"></i>Connecting to QuickBooks</h3>
                    </div>
                    <div class="card-body text-center">
                        <div id="loading" class="mb-4">
                            <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
                            <p class="lead">Connecting to QuickBooks...</p>
                        </div>
                        <div id="success" class="d-none mb-4">
                            <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                            <h4 class="text-success">Connection Successful!</h4>
                            <p>Your QuickBooks account has been connected successfully.</p>
                        </div>
                        <div id="error" class="d-none mb-4">
                            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                            <h4 class="text-danger">Connection Failed</h4>
                            <p id="error-message" class="text-danger"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        // Initialize Supabase client
        const supabase = supabaseCreateClient(
            'https://axmoffknvblluibuitrq.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4bW9mZmtudmJsbHVpYnVpdHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI0ODAsImV4cCI6MjA5MTQ0ODQ4MH0.SULFrXCwoABe9w4J_MBNQq6HQfzx2Sns-11uxGZYAso'
        );

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const realmId = urlParams.get('realmId');
        const state = urlParams.get('state');

        if (!code || !realmId) {
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('error').classList.remove('d-none');
            document.getElementById('error-message').textContent = 'Missing required parameters from QuickBooks.';
        }

        // Get current user session
        async function connectToQuickBooks() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) throw error;
                if (!session) {
                    throw new Error('No active user session found');
                }

                // Call edge function to exchange code for tokens
                const response = await fetch('/functions/v1/qb-oauth', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${session.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'exchange',
                        code: code,
                        realmId: realmId,
                        state: state
                    })
                });

                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Failed to connect to QuickBooks');
                }

                // Show success message
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('success').classList.remove('d-none');
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'settings.html';
                }, 2000);
            } catch (error) {
                console.error('Error connecting to QuickBooks:', error);
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('error').classList.remove('d-none');
                document.getElementById('error-message').textContent = error.message || 'An unexpected error occurred';
            }
        }

        // Start the connection process
        connectToQuickBooks();
    </script>
</body>
</html>
